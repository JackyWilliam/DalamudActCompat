name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DalamudActCompat.slnx

      - name: Build
        run: dotnet build DalamudActCompat.slnx --configuration Release --no-restore

      - name: Collect plugin artifact
        shell: pwsh
        run: ./tools/collect-release.ps1 -Configuration Release -OutputDirectory artifacts/release

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          gh release create $env:TAG_NAME artifacts/release/DalamudActCompat.zip `
            --title $env:TAG_NAME `
            --notes "Dalamud ACT Compat development release. FFXIV_ACT_Plugin/IINACT runtime integration is not live yet."
