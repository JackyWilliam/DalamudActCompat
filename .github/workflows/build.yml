name: Build

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DalamudActCompat.slnx

      - name: Build
        run: dotnet build DalamudActCompat.slnx --configuration Release --no-restore

      - name: Collect plugin artifact
        shell: pwsh
        run: ./tools/collect-release.ps1 -Configuration Release -OutputDirectory artifacts/release

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: DalamudActCompat
          path: artifacts/release/DalamudActCompat.zip
