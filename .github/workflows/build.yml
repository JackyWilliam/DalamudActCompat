name: Build

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DalamudActCompat.slnx

      - name: Build compatibility host
        run: dotnet build src/DalamudActCompat.Host/DalamudActCompat.Host.csproj --configuration Release --no-restore

      - name: Validate custom repository JSON
        shell: pwsh
        run: |
          Get-Content repo/pluginmaster.json -Raw | ConvertFrom-Json | Out-Null
          Write-Host "Plugin metadata is valid JSON."

      - name: Explain plugin build requirement
        run: |
          echo "The Dalamud plugin project is not built on GitHub-hosted runners because Dalamud.NET.Sdk requires local XIVLauncher/Dalamud dev files."
          echo "Build the full solution on a Windows machine with XIVLauncher/Dalamud installed."
